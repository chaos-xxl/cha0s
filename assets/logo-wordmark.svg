<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" width="680" height="220" role="img" aria-label="Doctor Chaos">
  <title>Doctor Chaos</title>

  <!-- Mark on the left -->
  <g transform="translate(20 10)">
    <line x1="100" y1="60"  x2="100" y2="100" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <line x1="40"  y1="100" x2="160" y2="100" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <line x1="40"  y1="100" x2="40"  y2="150" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="100" y2="150" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>
    <line x1="160" y1="100" x2="160" y2="150" stroke="#FF7A00" stroke-width="4" stroke-linecap="round"/>

    <circle cx="100" cy="35" r="25" fill="#FF7A00"/>
    <rect x="97.5" y="25" width="5" height="20" fill="#FFFFFF" rx="1"/>
    <rect x="90"   y="32.5" width="20" height="5" fill="#FFFFFF" rx="1"/>

    <circle cx="40" cy="170" r="18" fill="none" stroke="#FF7A00" stroke-width="5"/>
    <circle cx="40" cy="170" r="6" fill="#FF7A00"/>

    <circle cx="100" cy="170" r="18" fill="#FF7A00"/>

    <circle cx="160" cy="170" r="18" fill="none" stroke="#FF7A00" stroke-width="5"/>
  </g>

  <!-- Wordmark on the right -->
  <text x="230" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="52" fill="currentColor" letter-spacing="-1">Doctor Chaos</text>
  <text x="232" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="400" font-size="19" fill="currentColor" opacity="0.6" letter-spacing="0.3">conversation organization layer</text>
</svg>
